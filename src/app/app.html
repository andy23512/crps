<main class="shell">
  <mat-card class="game-card" appearance="outlined">
    <h1>{{ t('app.title') }}</h1>

    <div class="language-selector">
      <label for="language-select">{{ t('language.label') }}</label>
      <select
        id="language-select"
        [value]="currentLanguage"
        (change)="onLanguageChange($event)"
        data-testid="language-select"
      >
        <option value="en">{{ t('language.en') }}</option>
        <option value="ja">{{ t('language.ja') }}</option>
      </select>
    </div>

    <app-scoreboard
      [passedRounds]="score.passedRounds"
      [passedRoundsLabel]="t('score.passedRounds')"
    ></app-scoreboard>

    <button
      class="start-btn"
      mat-flat-button
      color="primary"
      type="button"
      (click)="startGame()"
      *ngIf="!gameStarted"
    >
      {{ t('button.startGame') }}
    </button>

    <ng-container *ngIf="gameStarted">
      <mat-card class="current-computer" appearance="outlined" aria-live="polite">
        <p class="label">{{ t('label.currentComputerMove') }}</p>
        <p class="value" data-testid="current-computer-move">
          {{ localizedMove }}
        </p>
      </mat-card>

      <mat-card class="current-target" appearance="outlined" aria-live="polite">
        <p class="label">{{ t('label.requiredRoundOutcome') }}</p>
        <p class="value" data-testid="current-target-outcome">
          {{ localizedTargetOutcome }}
        </p>
      </mat-card>

      <mat-card
        class="game-over"
        appearance="outlined"
        *ngIf="isGameOver"
        data-testid="game-over-status"
      >
        {{ t('status.gameOver') }}
      </mat-card>

      <mat-card
        class="round-timer"
        appearance="outlined"
        aria-live="polite"
        *ngIf="!isGameOver"
        data-testid="round-timer"
      >
        <span class="timer-label">{{ t('label.timeRemaining') }}</span>
        <span class="timer-value" data-testid="timer-value">{{ timeRemaining }}s</span>
      </mat-card>

      <app-move-controls
        [disabled]="isGameOver"
        [movesAriaLabel]="t('label.moveSelection')"
        [rockLabel]="t('move.rock')"
        [paperLabel]="t('move.paper')"
        [scissorsLabel]="t('move.scissors')"
        (moveSelected)="onMoveSelected($event)"
      ></app-move-controls>

      <button class="reset-btn" mat-flat-button color="primary" type="button" (click)="resetGame()">
        {{ t('button.newGame') }}
      </button>
    </ng-container>
  </mat-card>
</main>
